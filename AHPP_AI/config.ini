; InSim connection settings.
[InSim]
; LFS InSim host IP or hostname.
Host=127.0.0.1
; LFS InSim TCP port.
Port=29999
; UDP port used by OutGauge telemetry.
OutGaugePort=30000
; Admin password for privileged server commands.
AdminPassword=password

; AI debug and visualization toggles.
[DebugAI]
; Master toggle for AI debug features.
Enabled=1
; Automatically spawn AI cars on startup.
AutoSpawnAI=0
; Show waypoint debug markers automatically.
AutoVisualizeWaypoints=1
; Show axes gizmos for debug visualization.
AutoVisualizeAxes=0
; Log detailed InSim packet traffic.
VerboseInSimLogging=1
; Log extra lane change decision details.
LaneChangeDetailedLogging=1
; Enable active waypoint markers in world.
ActiveWaypointMarkers=1
; Interval for updating active waypoint markers.
ActiveWaypointIntervalMs=500
; Log performance timing metrics.
PerformanceLogging=1
; Show debug UI buttons in-game.
ShowDebugButtons=1
; Log per-tick AI control/state traces for debugging bad driving.
ControlTraceLogging=1
; Minimum time between repeated control traces for the same AI.
ControlTraceIntervalMs=1000
; Emit a trace immediately when the AI state/status changes.
ControlTraceLogOnStateChange=1

; Application logging configuration.
[Logging]
; Logging verbosity level.
Level=TRACE

; Route name mappings to route files.
[Routes]
; Primary recorded main route name used for the active layout.
Main=main_loop
; Primary recorded spawn / pit-entry route name used for the active layout.
Spawn=pit_entry
; Optional alternate-main and detour routes are discovered from recorded files and metadata.

; Optional fallback layout defaults keyed by track code.
; These are used before LFS reports a live layout name, based on folders under Routes/<track>/.
[TrackLayoutDefaults]
; Current saved defaults:
SO7=SO7_AHPP UNDERGROUND RACING

; Physical pit slot mapping for player and AI spawn control.
[PitSpawn]
; Players should not be assigned inside the reserved AI slot range.
AiReservedRangeStart=41
AiReservedRangeEnd=48
; Distance in metres used when checking whether a pit slot is already occupied.
OccupancyDistanceMeters=5.0
; Slot mapping format: SlotNumber=TAG|Display Name
41=AI_PIT_41|AI Pit 41
42=AI_PIT_42|AI BMW Area
43=AI_PIT_43|AI Pit 43
44=AI_PIT_44|Highway Area
45=AI_PIT_45|AI Pit 45
46=AI_PIT_46|AI Pit 46
47=AI_PIT_47|AI Pit 47
48=AI_PIT_48|AI Pit 48

; Global spawn mod pool. Each entry is ModName=Weight (relative weights, do not need to sum to 100).
; Optional per-mod preset: ModPreset.<full mod name>=Setup,Colour
[SpawnMods]
SLX180=15
VGI-6 SC=15
DORITO-FC7=15
INTERCEPTOR=10
HARMONY 4DR=15
CHORUS ATTENDANZE XT-Z 4R=10
SLX 3000X TURBO=10
JDX100=10
GHOUL 250RR=0
LINGEIRINHO GT=5

ModPreset.SLX180=3,4
ModPreset.VGI-6 SC=2,5
ModPreset.DORITO-FC7=2,4
ModPreset.INTERCEPTOR=3,8
ModPreset.HARMONY 4DR=2,1
ModPreset.CHORUS ATTENDANZE XT-Z 4R=4,5
ModPreset.SLX 3000X TURBO=1,8
ModPreset.JDX100=3,5
ModPreset.GHOUL 250RR=1,1
ModPreset.LINGEIRINHO GT=1,1

; Logical spawn area definitions keyed by the tag used above.
; FillPercent is this segment's share of the dynamic AI total.
; Routes should include the pit route first, then the main loop / alt / detour routes for that segment.
[PitSpawnArea.AI_PIT_41]
DisplayName=AI Track and Field
FillPercent=10
Routes=taf_pit,taf_route_loop

[PitSpawnArea.AI_PIT_42]
DisplayName=AI BMW Area
FillPercent=5
Routes=bmw_pit,bmw_route_loop

[PitSpawnArea.AI_PIT_43]
DisplayName=AI Tram
FillPercent=10
Routes=tram_pit,tram_route_loop

[PitSpawnArea.AI_PIT_44]
DisplayName=AI Highway Area
FillPercent=50
Routes=highway_pit,highway_route_loop,highway_route_alt

[PitSpawnArea.AI_PIT_45]
DisplayName=AI Drift Arena
FillPercent=10
Routes=da_pit,da_route_loop

[PitSpawnArea.AI_PIT_46]
DisplayName=AI Island Area
FillPercent=5
Routes=island_pit,island_route_loop

[PitSpawnArea.AI_PIT_47]
DisplayName=AI Drag Warehouse
FillPercent=10
Routes=warehouse_pit,warehouse_route_loop

[PitSpawnArea.AI_PIT_48]
DisplayName=AI Mall
FillPercent=0
Routes=mall_pit,mall_route_loop
; Example:
; AllowedMods=SLX180,VGI-6 SC
; ModPreset.SLX180=2,3
; ModPreset.VGI-6 SC=3,1
AllowedMods=SLX180,VGI-6 SC

; Core AI behavior and tuning settings.
[AI]
; Number of AI cars to spawn initially.
NumberOfAIs=0
; Delay after /mod before /setup and /colour are sent, so LFS has time to finish loading the mod.
ModLoadDelayMs=1500
; Delay before spawning AI after startup.
SpawnDelaySeconds=30
; Max server player slots.
MaxPlayers=48
; Slots reserved for humans or admins. Example: 48 max players with an 8-player buffer keeps 40 AI slots open.
ReservedSlots=8
; Target AI fill ratio for the remaining open slots after the player buffer is reserved.
AiFillRatio=1.00
; Minimum AI count to maintain.
MinAIs=0
; Maximum AI count to allow.
MaxAIs=40
; Interval for population adjustment checks.
AdjustIntervalMs=10000
; Number of AI cars to spawn per batch.
SpawnBatchSize=1
; Number of AI cars to remove per batch.
RemoveBatchSize=1
; Automatically manage AI population.
AutoManagePopulation=0
; Enable AII telemetry usage.
UseAiiTelemetry=1
; Base AII update interval in hundredths.
AIIBaseIntervalHundredths=100
; Max AII update interval in hundredths.
AIIMaxIntervalHundredths=200
; Packet rate budget per second.
PacketRateBudgetPerSecond=500
; Packet rate reserved for non-AI use.
PacketRateReservePerSecond=10
; Assumed Packets sent per AII update for budgeting purposes.
PacketsPerAIIUpdate=2
; Control loop tick rate in Hz.
ControlTickHz=20
; Reset steering/throttle/brake/gear/clutch each tick before applying new inputs.
; Useful for debugging stale controls, but it can interrupt timed light or horn inputs.
ResetInputsEveryTick=0
; Minimum control updates per AI per second.
MinControlHzPerAi=4
; Maximum control updates per AI per second.
MaxControlHzPerAi=8
; Target AII update rate in Hz.
AIITargetHz=1.0
; Telemetry warmup time before AI control.
TelemetryWarmupMs=2000
; Brake hold time during warmup.
WarmupBrakeHoldMs=1000
; Waypoint lookahead count for steering.
LookaheadWaypoints=2
; Multiplier for waypoint proximity checks.
WaypointProximityMultiplier=1.0
; Base throttle command value.
ThrottleBase=0
; Base brake command value.
BrakeBase=10000
; Speed error threshold for coasting brake.
BrakeCoastSpeedErrorKmh=1.0
; Speed error threshold to apply brake.
BrakeApplySpeedErrorKmh=4.0
; Brake increase step per control tick.
BrakeRiseStep=2500
; Brake release step per control tick.
BrakeReleaseStep=4000
; Minimum steering command value.
MinSteering=1
; Maximum steering command value.
MaxSteering=65535
; Center steering command value.
SteeringCenter=32768
; Steering smoothing damping factor.
SteeringDamping=1.0
; Steering deadzone in degrees.
SteeringDeadzoneDegrees=0.0
; Enable pass-by reaction behavior.
PassByReactionEnabled=1
; Chance to react during pass-by.
PassByReactionChance=0.10
; Speed threshold for pass-by reactions.
PassBySpeedThresholdKmh=120.0
; Duration of pass-by reaction.
PassByReactionDurationSeconds=2.0
; Distance threshold for pass-by reaction.
PassByReactionDistanceMeters=25.0
; Reaction mode (flash, horn, etc).
PassByReactionMode=FlashAndHorn
; Clutch value when fully pressed.
ClutchFullyPressed=65535
; Clutch value when fully released.
ClutchReleased=0
; Delay before pressing clutch on shift.
ClutchPressDelayMs=100
; Hold clutch after shifting gears.
ClutchHoldAfterShiftMs=150
; Throttle value (0-65535) applied during initial spawn launch clutch release (~27% = 18000).
LaunchThrottleValue=20000
; Time in ms to hold clutch fully in before starting to release on spawn.
LaunchHoldMs=400
; Time in ms to fully release the clutch during spawn launch (longer = smoother, less stall risk).
LaunchClutchReleaseMs=3500
; Timeout in ms before proceeding with a gear shift if LFS never confirms the gear (0 = wait forever).
GearConfirmationTimeoutMs=2000
; Number of steps to release clutch.
ClutchReleaseSteps=5
; Interval between clutch release steps.
ClutchReleaseIntervalMs=100
; RPM threshold to trigger stall prevention.
StallPreventionRpm=500
; RPM threshold to release stall prevention.
StallPreventionReleaseRpm=900
; Hold time for stall prevention.
StallPreventionHoldMs=750
; Enable pure pursuit steering control.
PurePursuitEnabled=1
; Min lookahead distance for pure pursuit.
PurePursuitLookaheadMinMeters=3.0
; Max lookahead distance for pure pursuit.
PurePursuitLookaheadMaxMeters=20.0
; Speed factor for lookahead scaling.
PurePursuitLookaheadSpeedFactor=0.35
; Vehicle wheelbase used in pure pursuit.
PurePursuitWheelbaseMeters=2.5
; Steering gain for pure pursuit.
PurePursuitSteeringGain=1.4
; Max steer angle for pure pursuit.
PurePursuitMaxSteerDegrees=45.0
; Minimum waypoint reach threshold.
WaypointMinThreshold=1.5
; Maximum waypoint reach threshold.
WaypointMaxThreshold=5.0
; Speed factor for waypoint threshold scaling.
WaypointThresholdSpeedFactor=0.1
; Timeout before waypoint is considered missed.
WaypointTimeoutSeconds=30
; Interval for progress validation checks.
ProgressCheckIntervalMs=5000
; Minimum progress required to be valid.
MinRequiredProgress=5.0
; Max recovery attempts per stuck event.
MaxRecoveryAttempts=5
; Max failed recovery cycles allowed.
MaxFailedRecoveryCycles=2
; Enable wall recovery logic.
WallRecoveryEnabled=1
; Minimum speed threshold for motion.
MinSpeedThreshold=1.0
; Stationary detection sample count.
StationaryCheckCount=3
; Distance to reset progress advance.
ProgressAdvanceResetDistanceMeters=10.0
; Short reverse time during recovery.
RecoveryShortReverseMs=500
; Long reverse time during recovery.
RecoveryLongReverseMs=2000
; Cooldown between recovery actions.
RecoveryCooldownMs=2000
; Window for validating recovery success.
RecoveryValidationWindowMs=4000
; Distance needed to count recovery success.
RecoverySuccessDistanceMeters=2.0
; Speed needed to count recovery success.
RecoverySuccessSpeedKmh=5.0
; Min position change to count as moving.
RecoveryPositionChangeThreshold=1.0
; Progress threshold to detect stall.
RecoveryProgressStallThreshold=0.2
; Interval between stuck checks.
RecoveryStuckCheckIntervalMs=4000
; Low speed threshold for recovery checks.
RecoveryLowSpeedThresholdKmh=5.0
; Detections before recovery action.
RecoveryDetectionsBeforeAction=3
; Max consecutive recovery failures allowed.
RecoveryMaxFailureCount=3
; Reverse trigger count for stall recovery.
RecoveryStallReverseTrigger=2
; Delay between gear shifts.
ShiftDelayMs=500
; Speed thresholds for gear upshifts.
GearSpeedThresholdsKmh=20,40,60,80,100
; Hysteresis for upshift decisions.
GearUpshiftHysteresisKmh=6
; Hysteresis for downshift decisions.
GearDownshiftHysteresisKmh=6
; Minimum interval between gear shifts.
GearShiftMinIntervalMs=1000
; Build identifier for config tracking.
BuildVersion=2024.09.05.1
; Collision detection range in meters.
CollisionDetectionRangeM=30.0
; Collision detection angle in degrees.
CollisionDetectionAngle=45.0
; Minimum safety distance to other cars.
MinimumSafetyDistanceM=15.0
; Half-width used for collision checks.
CollisionDetectionHalfWidthM=3.0
; Distance to treat path loop as closed.
PathLoopClosureDistanceMeters=5.0
; Half-width of traffic lane in meters.
TrafficLaneHalfWidthMeters=3.5
; Base gap distance between traffic cars.
TrafficBaseGapMeters=4.0
; Time headway for traffic following.
TrafficTimeHeadwaySeconds=1.5
; AI spacing multiplier in traffic.
TrafficAiSpacingFactor=1.2
; Human spacing multiplier in traffic.
TrafficHumanSpacingFactor=1.4
; Traffic lookahead time in seconds.
TrafficLookaheadSeconds=3.0
; Minimum traffic lookahead distance.
TrafficLookaheadMinMeters=15.0
; TTC threshold for normal braking.
TrafficBrakeTtcSeconds=3.5
; TTC threshold for emergency braking.
TrafficEmergencyTtcSeconds=2.0
; Enable loop-route spacing equalization so cruise traffic gently redistributes around the route.
TrafficSpacingEqualizerEnabled=true
; Minimum number of cars on the same loop before spacing equalization activates.
TrafficSpacingEqualizerMinCars=4
; Strength of the spacing equalizer speed correction in km/h.
TrafficSpacingEqualizerGainKmh=6.0
; Maximum speed bias the spacing equalizer may add or remove.
TrafficSpacingEqualizerMaxBiasKmh=6.0
; Stable per-car spacing variation as a fraction of ideal loop spacing.
TrafficSpacingEqualizerVariationPercent=0.10
; Smoothing factor applied each tick to avoid accordion oscillation.
TrafficSpacingEqualizerSmoothing=0.12
; Lookahead waypoints to hold during merge.
SpawnMergeHoldLookaheadWaypoints=3
; Distance to hold during merge.
SpawnMergeHoldDistanceMeters=15.0
; Reject spawn-route candidates farther than this from the live spawn position.
MaxSpawnInitialRouteDistanceMeters=100.0

; Race-mode tuning for AI that spawn directly on the track.
[RaceMode]
; Let LFS handle gears and clutch while in race mode.
UseAutomaticTransmission=1
; Extra score margin the track route must beat the pit/spawn route by before race mode is selected.
TrackSpawnScoreAdvantage=8.0
; Multiplier applied to recorded waypoint speeds in race mode.
WaypointSpeedFactor=1.12
; Flat km/h bonus added after the race speed multiplier.
WaypointSpeedOffsetKmh=8.0
; Hard cap for race-mode target speeds.
WaypointSpeedCapKmh=260.0
; Max target speed allowed during light steering corrections.
LightTurnSpeedCapKmh=120.0
; Max target speed allowed during medium turns.
MediumTurnSpeedCapKmh=85.0
; Max target speed allowed during hard turns.
HardTurnSpeedCapKmh=50.0
; Hold each gear longer before upshifting in race mode.
UpshiftThresholdMultiplier=1.25

; Lane change behavior tuning.
[LaneChange]
; Interval between initial lane change checks.
InitialCheckIntervalSeconds=10
; Interval between checks after cooldown.
PostCooldownCheckIntervalSeconds=10
; Probability to attempt a merge.
MergeChance=0.30
; Cooldown period between merge attempts.
CooldownSeconds=180
; Distance for safety checks ahead/behind.
SafetyCheckDistanceMeters=25.0
; Half-width for safety check envelope.
SafetyCheckHalfWidthMeters=3.5
; Max parallel distance allowed for merge.
MaxParallelDistanceMeters=12.0
; Max heading delta allowed for merge.
MaxParallelHeadingDegrees=10.0
; Lookahead time for parallel safety checks.
ParallelLookaheadSeconds=1.5
; Minimum parallel lookahead distance.
ParallelLookaheadMinMeters=20.0
; Max speed allowed for merge.
MaxMergeSpeedKmh=160
; Lead time before turn signal on merge.
SignalLeadTimeSeconds=2.0
; Minimum signal duration for merge.
SignalMinimumDurationSeconds=3.5
; Transition length for lane change path.
TransitionLengthMeters=10
; Number of points in transition path.
TransitionPointCount=6
; Waypoints to target ahead during merge.
TargetAheadWaypoints=6
; Rear check distance for merge safety.
RearCheckDistanceMeters=35.0
; Rear TTC threshold for merge safety.
RearCheckTtcSeconds=2.5
; Gap scaling factor for merge decisions.
MergeGapFactor=1.2

; Route recording options.
[Recording]
; Minimum meters between recorded points.
IntervalMeters=5.0
